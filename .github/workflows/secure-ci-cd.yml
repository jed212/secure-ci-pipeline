# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Secure-ci-cd

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    defaults:
      run:
       working-directory: ./secure-gitops-platform/app
       
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Build
      run: go build -v ./...
      
    # Run tests
    - name: Test
      run: go test -v ./...

    - name: Run Go vet
      run: go vet ./...

    - name: Check Formatting
      run: test -z "$(gofmt -l .)"
      
    # Run lint on the application
    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.64.5
        skip-cache: true
        working-directory: ./secure-gitops-platform/app

    # Run security Scans; Gitleaks to check for secrets, trivy for container image and dependency/filesystem scanning
    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      
    # Filesystem scan
    - name: Trivy FS Scan
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'
        
    # Build image stage
    - name: Build Docker Image
      run: docker build -t secure-go-api:1.0 .
      working-directory: ./secure-gitops-platform

    # Docker Image scan configured to fail for Critical and High severity vulnerabilities
    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        image-ref: 'secure-go-api:1.0'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'
