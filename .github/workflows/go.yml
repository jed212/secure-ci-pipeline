# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    defaults:
      run:
       working-directory: ./secure-gitops-platform/app
       
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Run Go vet
      run: go vet ./...

    - name: Check Formatting
      run: test -z "$(gofmt -l .)"

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.64.5
        skip-cache: true
